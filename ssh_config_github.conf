# Baked into the base devcontainer image at /etc/ssh/ssh_config.d/. Offers the
# seeded ed25519 key for GitHub and adds it to the shared ssh-agent on first use
# (see /usr/local/bin/ssh-agent-init.sh). A per-user ~/.ssh/config seeded from
# the host is read first and still wins on any overlapping option.
Host github.com
    User git
    IdentityFile ~/.ssh/id_ed25519
    IdentitiesOnly yes
    AddKeysToAgent yes
